<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>社員ログイン｜株式会社H.I.T</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="style.css?v=9">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html">
    <img src="assets/hit-logo.jpeg" alt="H.I.T ロゴ">
    <div>
      <strong>H.I.T</strong>
      <span>発電機の安心を、確かな技術で。</span>
    </div>
  </a>
  <nav class="nav">
    <a href="index.html">ホーム</a>
    <a href="service.html">サービス</a>
    <a href="works.html">実績</a>
    <a href="equipment.html">対応設備</a>
    <a href="company.html">会社概要</a>
    <a class="nav-cta" href="contact.html">お問い合わせ</a>
  </nav>
</header>

<main class="login-page">
  <section class="login-card">
    <h1>社員ログイン</h1>
    <p>負荷試験報告書アプリへログインします。</p>

    <label for="email">メールアドレス</label>
    <input id="email" type="email" autocomplete="email" placeholder="example@hit-tech.jp">

    <label for="password">パスワード</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="パスワード">

    <button id="loginBtn" type="button">ログイン</button>
    <p id="loginError" class="login-error"></p>
    <p class="login-note">ログイン後、負荷試験報告書アプリへ移動します。</p>
  </section>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { firebaseConfig } from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const email = document.getElementById('email');
const password = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

loginBtn.addEventListener('click', async () => {
  loginError.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email.value.trim(), password.value);
    location.href = './load-test-app/index.html';
  } catch (error) {
    loginError.textContent = 'ログインできません。メールアドレスまたはパスワードを確認してください。';
  }
});
</script>
</body>
</html>
